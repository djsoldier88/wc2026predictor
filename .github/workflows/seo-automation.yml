name: SEO automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4,10,16,20 * * *"

permissions:
  contents: write

jobs:
  publish-seo-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate SEO pages
        run: node scripts/seo-automation.mjs

      - name: Commit generated changes
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No SEO changes to commit."
          else
            git add -A
            git commit -m "Publish SEO discovery pages"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit updated URLs to IndexNow
        if: steps.commit.outputs.changed == 'true'
        run: node scripts/submit-indexnow.mjs
